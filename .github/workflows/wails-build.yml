name: Wails Build

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: wails-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.22.4'
  NODE_VERSION: '22'
  WAILS_VERSION: 'v2.10.2'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  build-windows:
    name: Build Windows Wails artifact
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check Go module tidiness
        shell: pwsh
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet Go code
        run: go vet ./...

      - name: Test Go code
        run: go test ./...

      - name: Lint Go code
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Show Wails version
        run: wails version

      - name: Build Wails desktop binary
        run: wails build -clean -s -platform windows/amd64 -o ParaDiced.exe

      - name: Generate checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash build/bin/ParaDiced.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  ParaDiced.exe" | Out-File -Encoding ascii build/bin/ParaDiced.exe.sha256

      - name: Upload Wails artifact
        uses: actions/upload-artifact@v7
        with:
          name: ParaDiced-windows-amd64-pr-${{ github.event.pull_request.number }}
          path: |
            build/bin/ParaDiced.exe
            build/bin/ParaDiced.exe.sha256
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: Build macOS Wails artifact
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check Go module tidiness
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet Go code
        run: go vet ./...

      - name: Test Go code
        run: go test ./...

      - name: Lint Go code
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Show Wails version
        run: wails version

      - name: Build Wails desktop binary
        run: wails build -clean -s -platform darwin/arm64 -o ParaDiced

      - name: Package macOS app
        run: |
          cd build/bin
          zip -r ParaDiced-darwin-arm64.zip *.app
          shasum -a 256 ParaDiced-darwin-arm64.zip > ParaDiced-darwin-arm64.zip.sha256

      - name: Upload Wails artifact
        uses: actions/upload-artifact@v7
        with:
          name: ParaDiced-darwin-arm64-pr-${{ github.event.pull_request.number }}
          path: |
            build/bin/ParaDiced-darwin-arm64.zip
            build/bin/ParaDiced-darwin-arm64.zip.sha256
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux Wails AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            pkg-config \
            file \
            patchelf \
            libfuse2 \
            libglib2.0-0 \
            libnss3 \
            libx11-6 \
            libxext6 \
            libxrender1 \
            libxrandr2
          # Ubuntu package transition: libasound2 -> libasound2t64 on newer images
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check Go module tidiness
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet Go code
        run: go vet ./...

      - name: Test Go code
        run: go test ./...

      - name: Lint Go code
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Show Wails version
        run: wails version

      - name: Build Wails desktop binary
        run: wails build -clean -s -platform linux/amd64 -tags webkit2_41

      - name: Download AppImage tools (linuxdeploy + gtk plugin)
        shell: bash
        run: |
          set -euo pipefail

          # linuxdeploy binary (AppImage)
          wget -c "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"

          # linuxdeploy-plugin-gtk has no Releases anymore; use the project's recommended installer script
          wget -c "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"

          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh

          # optional sanity checks
          ./linuxdeploy-x86_64.AppImage --version
          ./linuxdeploy-plugin-gtk.sh --help >/dev/null

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp build/bin/ParaDiced AppDir/usr/bin/

          cat > AppDir/paradiced.desktop << 'EOF'
          [Desktop Entry]
          Name=ParaDiced
          Exec=ParaDiced
          Icon=paradiced
          Type=Application
          Categories=Game;
          EOF

          cp public/assets/logo.png AppDir/paradiced.png

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/ParaDiced \
            --desktop-file AppDir/paradiced.desktop \
            --icon-file AppDir/paradiced.png \
            --plugin gtk \
            --output appimage

          mv ParaDiced-x86_64.AppImage build/bin/ParaDiced-x86_64.AppImage
          sha256sum build/bin/ParaDiced-x86_64.AppImage > build/bin/ParaDiced-x86_64.AppImage.sha256

      - name: Upload Wails artifact
        uses: actions/upload-artifact@v7
        with:
          name: ParaDiced-linux-amd64-pr-${{ github.event.pull_request.number }}
          path: |
            build/bin/ParaDiced-x86_64.AppImage
            build/bin/ParaDiced-x86_64.AppImage.sha256
          if-no-files-found: error
          retention-days: 14
