name: Wails Build

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: wails-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.22.4'
  NODE_VERSION: '22'
  WAILS_VERSION: 'v2.10.2'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  build-windows:
    name: Build Windows Wails artifact
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check Go module tidiness
        shell: pwsh
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet Go code
        run: go vet ./...

      - name: Test Go code
        run: go test ./...

      - name: Lint Go code
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Show Wails version
        run: wails version

      - name: Build Wails desktop binary
        run: wails build -clean -s -platform windows/amd64 -o ParaDiced.exe

      - name: Generate checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash build/bin/ParaDiced.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  ParaDiced.exe" | Out-File -Encoding ascii build/bin/ParaDiced.exe.sha256

      - name: Upload Wails artifact
        uses: actions/upload-artifact@v7
        with:
          name: ParaDiced-windows-amd64-pr-${{ github.event.pull_request.number }}
          path: |
            build/bin/ParaDiced.exe
            build/bin/ParaDiced.exe.sha256
          if-no-files-found: error
          retention-days: 14
